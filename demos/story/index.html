<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Risk to Resilience — MapX Story Demo</title>

    <!--
      Mangrove CSS — UNDRR's shared component library.
      Provides the page header, button styles (mg-button, mg-button-primary,
      mg-button-secondary), tag badges (mg-tag), color utility classes
      (mg-u-background-color, mg-u-color), container layout (mg-container),
      and typography defaults used throughout this page.
    -->
    <link rel="stylesheet" href="https://assets.undrr.org/testing/static/mangrove/1.4.0/css/style.css" />
  </head>
  <body>

    <!--
      PIN gate overlay — full-screen modal that blocks all interaction
      until the user enters the correct preview PIN. Dismissed by
      initPinGate() in main.js once the PIN is validated.
    -->
    <div id="pin-gate" class="pin-gate">
      <div class="pin-gate__card">
        <h2 class="mg-u-font-size-500" style="margin-top:0;">Preview Access</h2>
        <p class="mg-u-font-size-300" style="line-height:1.5;margin-bottom:2rem;">
          This is an <strong>unofficial investigation proof of concept</strong>
          for demonstration purposes only. It is not an official UNDRR product.
        </p>
        <p style="font-size:1.4rem;margin-bottom:1.5rem;">
          Enter the preview PIN to continue:
        </p>
        <input id="pin-input" type="text" inputmode="numeric" maxlength="4"
          placeholder="_ _ _ _" class="pin-gate__input"
          aria-label="Preview PIN"
        />
        <p id="pin-error" class="pin-gate__error"></p>
      </div>
    </div>

    <!--
      Page header — Mangrove mg-page-header component.
      The decoration stripe (four colored divs) renders the UNDRR
      brand bar. The toolbar wrapper holds the UNDRR logo.
    -->
    <header class="mg-page-header mg-page-header--default">
      <div class="mg-page-header__decoration">
        <div></div><div></div><div></div><div></div>
      </div>
      <div class="mg-page-header__toolbar-wrapper">
        <div class="mg-page-header__container mg-container">
          <div class="mg-page-header__region mg-page-header__region--toolbar">
            <section class="mg-page-header__block mg-page-header__block--logo">
              <a href="https://www.undrr.org">
                <img src="https://assets.undrr.org/static/logos/undrr/undrr-logo-horizontal.svg"
                     alt="UNDRR Logo" width="324" height="47"
                     title="UNDRR — United Nations Office for Disaster Risk Reduction"
                     class="mg-page-header__logo-img" />
              </a>
            </section>
          </div>
        </div>
      </div>
    </header>

    <!--
      Title bar — blue-900 banner with a back-link to the landing page
      and the story title. The #status tag shows SDK connection state
      ("Loading SDK..." → "Connected").
    -->
    <div class="mg-u-background-color--blue-900">
      <div class="mg-container app-title-bar">
        <div style="display:flex;align-items:center;gap:1rem;">
          <a href="/mapx-demo-embed/" style="color:#fff;text-decoration:none;font-size:1.4rem;opacity:0.8;">&#8592; All Demos</a>
          <h1 class="mg-u-color--white" style="margin:0;">Risk to Resilience</h1>
        </div>
        <span class="mg-tag mg-tag--outline" style="color:#fff;border-color:#fff" id="status">Loading SDK...</span>
      </div>
    </div>

    <!--
      story-body — horizontal flex layout: narrative panel (left) + map (right).
      On mobile (<768px) the layout stacks vertically via CSS media query.
    -->
    <div class="story-body">

      <!--
        Narrative panel (sidebar) — three vertical sections:
          1. narrative-content: step title + explanatory body text (scrollable)
          2. step-dots: horizontal row of dot indicators, one per step
          3. narrative-nav: Prev/Next buttons + "N / M" step counter
      -->
      <aside class="narrative-panel" id="narrative-panel">
        <div class="narrative-content">
          <h2 id="narrative-title">Loading...</h2>
          <p id="narrative-text">Connecting to MapX...</p>
        </div>
        <div class="step-dots" id="step-dots"></div>
        <div class="narrative-nav">
          <!-- disabled attribute prevents clicks before SDK ready; CSS class provides visual style -->
          <button class="mg-button mg-button-secondary disabled" id="btn-prev-step" disabled>&#8592; Previous</button>
          <span class="step-count" id="step-count">0 / 0</span>
          <button class="mg-button mg-button-primary disabled" id="btn-next-step" disabled>Next &#8594;</button>
        </div>
      </aside>

      <!-- Map area — the SDK creates its iframe inside #mapx -->
      <div class="app-map">
        <div id="mapx"></div>
      </div>
    </div>

    <!--
      SDK script loading order:
        1. mxsdk.umd.js — the MapX SDK UMD bundle (exposes the global mxsdk
           constructor). Must load before the module script below.
        2. main.js — ES module entry point that initialises the SDK, wires the
           step engine, and starts the story at step 0.
    -->
    <script src="https://app.mapx.org/sdk/mxsdk.umd.js"></script>
    <script type="module" src="/demos/story/main.js"></script>
  </body>
</html>
